name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Validate HTML
        run: npx --yes html-validate "*.html"
      - name: Lint CSS
        run: npx --yes stylelint "css/**/*.css"
